services:
  pipeline:
    build: .
    volumes:
      - ./data:/app/data
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python src/run.py --url "${YOUTUBE_URL}"

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"  # Neo4j Browser
      - "7687:7687"  # Bolt protocol
    volumes:
      - ./data/neo4j:/data
    environment:
      - NEO4J_AUTH=neo4j/podscope-local
